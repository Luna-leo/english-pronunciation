name: Claude Plan

# 計画フェーズ: @claude-plan で起動。--permission-mode plan で read-only。
# 変更対象ファイル・影響範囲・手順・懸念点をコメント投稿させる(実装はしない)。
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-plan:
    # トリガー: @claude-plan フレーズ + write 権限保持者(OWNER/MEMBER/COLLABORATOR)のみ。
    # 外部ユーザーが計画フェーズを起動できないようにする。
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude-plan') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude-plan') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude-plan') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'MEMBER' ||
         github.event.review.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude-plan') ||
         contains(github.event.issue.title, '@claude-plan')) &&
        (github.event.issue.author_association == 'OWNER' ||
         github.event.issue.author_association == 'MEMBER' ||
         github.event.issue.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude-plan"
          # 計画は推論力重視で Opus(4.8)。--permission-mode plan で read-only。
          # Anthropic 側の過負荷(overloaded)時は Sonnet(4.6)へ自動フォールバック。
          # ※使用枠超過などのレート制限/クォータ系では発動しない点に注意。
          claude_args: "--permission-mode plan --model claude-opus-4-8 --fallback-model claude-sonnet-4-6"
